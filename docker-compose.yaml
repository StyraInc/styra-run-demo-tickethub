version: "3"

services:
  server-node:
    build: server/node/
    environment:
      - OPA_URL=http://opa:8181
    ports:
      - "4000:4000"
    profiles:
      - node

  server-java:
    build: server/java/
    init: true
    environment:
      - OPA_URL=http://opa:8181
    ports:
      - "4000:4000"
    profiles:
      - java
    volumes:
      - ./server/java:/mnt/tickethub-java:ro

  ui:
    build: client/react/
    init: true
    # TODO: should probably handle exposing the BE API into the FE in a more
    # idiomatic way, e.g. OPA_URL
    network_mode: host
    volumes:
      - ./client/react:/mnt/tickethub-ui-react:ro

  # TODO
  # server-csharp:

  opa:
    image: ${OPA_IMAGE:-docker.io/openpolicyagent/opa:latest}
    ports:
      - "8181:8181"
    command:
      - run
      - --server
      - --addr=:8181
      - policies
    working_dir: /work
    volumes:
      - ./policies:/work/policies

  integration-tests:
    image: ghcr.io/orange-opensource/hurl:latest
    volumes:
      - ./tests:/tests
    command:
      - --test
      - --retry=10
      - --verbose
      - --report-junit=tests/api/report.xml
      - tests/api/basic.hurl
    environment:
      - HURL_host=server-${VARIANT:-node}
    profiles:
      - tools
